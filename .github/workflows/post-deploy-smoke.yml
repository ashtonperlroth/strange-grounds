name: Post-Deploy Smoke Tests

on:
  deployment_status:

jobs:
  smoke-tests:
    name: Smoke Tests against ${{ github.event.deployment_status.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only run on successful deployments to Production
    if: >
      github.event.deployment_status.state == 'success' &&
      contains(github.event.deployment_status.environment, 'Production')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.git.sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests against live deployment
        run: npx playwright test tests/smoke.spec.ts --reporter=list
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.event.deployment_status.target_url }}

      - name: Upload test results on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ github.sha }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14
